<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Grocery List — Gym Partners</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;padding:16px;min-height:100vh}
.wrap{max-width:640px;margin:0 auto}
.back{display:inline-block;font-size:12px;color:#534AB7;text-decoration:none;margin-bottom:1.5rem}
.back:hover{text-decoration:underline}
h1{font-size:24px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:1rem}
.toolbar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.toolbar button{font-size:12px;padding:8px 14px;border-radius:8px;border:1px solid #e5e5e5;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:600;transition:all .15s}
.toolbar button:hover{border-color:#534AB7;background:#EEEDFE}
.toolbar button.active{background:#534AB7;color:#fff;border-color:#534AB7}
h2{font-size:14px;font-weight:700;margin:1.5rem 0 .5rem;padding-bottom:4px;border-bottom:2px solid #FFF3E0;text-transform:uppercase;letter-spacing:1px;font-size:11px;color:#999}
.item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.item:hover{border-color:#534AB7}
.item.checked{opacity:.5;text-decoration:line-through;background:#fafafa}
.item.checked .checkbox{background:#534AB7;border-color:#534AB7}
.item.checked .checkbox::after{content:'✓';color:#fff;font-size:11px}
.checkbox{width:22px;height:22px;border:2px solid #ccc;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-text{font-size:13px;flex:1}
.item-note{font-size:11px;color:#999}
.counter{font-size:12px;color:#666;margin-bottom:1.5rem}
.footer{margin-top:2rem;font-size:11px;color:#999;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">&larr; Back to Gym Partners</a>
  <h1>Grocery List</h1>
  <div class="sub">Combined Aldi-optimized list for both of you. Tap items to check off — saves automatically.</div>

  <div class="toolbar">
    <button class="active" onclick="filterItems('all')">All</button>
    <button onclick="filterItems('unchecked')">Remaining</button>
    <button onclick="clearAll()">Reset All</button>
  </div>
  <div class="counter" id="counter"></div>

  <div id="list"></div>

  <div class="footer">Two Latinos &middot; Gym Partners</div>
</div>

<script>
const ITEMS = [
  { cat: "Proteins", name: "Chicken breast (family pack)", note: "Both — meal prep staple" },
  { cat: "Proteins", name: "Ground turkey 93/7", note: "Him — tacos, bowls" },
  { cat: "Proteins", name: "Eggs (18-pack)", note: "Both — breakfast, snacks" },
  { cat: "Proteins", name: "Greek yogurt (plain, large tub)", note: "Both — protein snack, smoothies" },
  { cat: "Proteins", name: "Canned tuna (4-pack)", note: "Quick protein, salads" },
  { cat: "Proteins", name: "Black beans (canned, 4-pack)", note: "Both — rice bowls, tacos" },

  { cat: "Produce", name: "Mangos (3-4)", note: "Pre-workout — split rule" },
  { cat: "Produce", name: "Bananas (bunch)", note: "Both — pre-workout, smoothies" },
  { cat: "Produce", name: "Grapes (bag)", note: "Her — quick carbs" },
  { cat: "Produce", name: "Pineapple (whole or pre-cut)", note: "Anti-inflammatory boost" },
  { cat: "Produce", name: "Mixed berries (frozen bag)", note: "Her — shake add-in" },
  { cat: "Produce", name: "Broccoli (fresh or frozen)", note: "Both — dinner side" },
  { cat: "Produce", name: "Spinach (baby, bag)", note: "Both — salads, smoothies" },
  { cat: "Produce", name: "Sweet potatoes (4-5)", note: "Both — post-workout carbs" },
  { cat: "Produce", name: "Avocados (3-4)", note: "Both — healthy fats" },
  { cat: "Produce", name: "Onions & garlic", note: "Cooking basics" },
  { cat: "Produce", name: "Limes (bag)", note: "Flavor everything" },

  { cat: "Carbs & Pantry", name: "Jasmine rice (5 lb bag)", note: "Both — meal prep base" },
  { cat: "Carbs & Pantry", name: "Oats (large canister)", note: "Both — breakfast, overnight oats" },
  { cat: "Carbs & Pantry", name: "Rice cakes", note: "Pre-workout carb base" },
  { cat: "Carbs & Pantry", name: "Whole wheat tortillas", note: "Both — wraps, quick meals" },
  { cat: "Carbs & Pantry", name: "Peanut butter (natural)", note: "Both — snack, rice cakes" },
  { cat: "Carbs & Pantry", name: "Honey", note: "Pre-workout drizzle" },
  { cat: "Carbs & Pantry", name: "Olive oil", note: "Cooking staple" },
  { cat: "Carbs & Pantry", name: "Oat milk (him) / Almond milk (her)", note: "Shake bases" },
  { cat: "Carbs & Pantry", name: "Hot sauce / Salsa", note: "Flavor, zero cal" },

  { cat: "Supplements", name: "Creatine Monohydrate (micronized)", note: "Both — daily" },
  { cat: "Supplements", name: "Vega Sport Premium Plant Protein", note: "Him — post-workout" },
  { cat: "Supplements", name: "Whey Protein Isolate (any brand)", note: "Her — post-workout" }
];

const STORAGE_KEY = 'gym-grocery-checked';

function getChecked() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveChecked(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

let currentFilter = 'all';

function render() {
  const checked = getChecked();
  const list = document.getElementById('list');
  let html = '';
  let currentCat = '';
  let total = ITEMS.length;
  let done = checked.length;

  ITEMS.forEach((item, i) => {
    const isChecked = checked.includes(i);
    if (currentFilter === 'unchecked' && isChecked) return;

    if (item.cat !== currentCat) {
      currentCat = item.cat;
      html += `<h2>${currentCat}</h2>`;
    }
    html += `<div class="item ${isChecked ? 'checked' : ''}" onclick="toggle(${i})">
      <div class="checkbox">${isChecked ? '' : ''}</div>
      <div class="item-text">${item.name}</div>
      <div class="item-note">${item.note}</div>
    </div>`;
  });

  list.innerHTML = html;
  document.getElementById('counter').textContent = `${done} of ${total} items checked`;
}

function toggle(index) {
  let checked = getChecked();
  if (checked.includes(index)) {
    checked = checked.filter(i => i !== index);
  } else {
    checked.push(index);
  }
  saveChecked(checked);
  render();
}

function filterItems(filter) {
  currentFilter = filter;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function clearAll() {
  if (confirm('Reset all checked items?')) {
    saveChecked([]);
    render();
  }
}

render();
</script>
</body>
</html>
