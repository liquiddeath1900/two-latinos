<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Grocery List — Gym Partners</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;padding:16px;min-height:100vh}
.wrap{max-width:640px;margin:0 auto}
.back{display:inline-block;font-size:12px;color:#534AB7;text-decoration:none;margin-bottom:1.5rem}
.back:hover{text-decoration:underline}
h1{font-size:24px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:1rem}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-radius:10px;overflow:hidden;border:1px solid #e5e5e5}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#666;transition:all .15s;border:none}
.tab.active-his{background:#F57C00;color:#fff}
.tab.active-hers{background:#43A047;color:#fff}
.toolbar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.toolbar button{font-size:12px;padding:8px 14px;border-radius:8px;border:1px solid #e5e5e5;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:600;transition:all .15s}
.toolbar button:hover{border-color:#534AB7;background:#EEEDFE}
.toolbar button.active{background:#534AB7;color:#fff;border-color:#534AB7}
h2{font-size:14px;font-weight:700;margin:1.5rem 0 .5rem;padding-bottom:4px;border-bottom:2px solid #FFF3E0;text-transform:uppercase;letter-spacing:1px;font-size:11px;color:#999}
.item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.item:hover{border-color:#F57C00}
.item.checked{opacity:.5;text-decoration:line-through;background:#fafafa}
.item.checked .checkbox{background:#F57C00;border-color:#F57C00}
.item.checked .checkbox::after{content:'✓';color:#fff;font-size:11px}
.item-hers:hover{border-color:#43A047}
.item-hers.checked .checkbox{background:#43A047;border-color:#43A047}
.checkbox{width:22px;height:22px;border:2px solid #ccc;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-text{font-size:13px;flex:1}
.item-qty{font-size:11px;color:#F57C00;font-weight:600;white-space:nowrap}
.item-hers .item-qty{color:#43A047}
.item-note{font-size:11px;color:#999}
.counter{font-size:12px;color:#666;margin-bottom:1.5rem}
.note{padding:12px 14px;border-radius:10px;font-size:12px;margin-bottom:1rem}
.note-green{background:#E1F5EE;color:#04342C}
.note-purple{background:#EEEDFE;color:#3C3489}
.note-orange{background:#FFF3E0;color:#7A4A00}
.footer{margin-top:2rem;font-size:11px;color:#999;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">&larr; Back to Gym Partners</a>
  <h1>Grocery List</h1>
  <div class="sub">2-week bulk buy — your own list, your own amounts. Tap to check off.</div>

  <div class="tabs">
    <button class="tab active-his" id="tab-his" onclick="switchList('his')">His List</button>
    <button class="tab" id="tab-hers" onclick="switchList('hers')">Her List</button>
  </div>

  <div class="toolbar">
    <button class="active" onclick="filterItems('all')">All</button>
    <button onclick="filterItems('unchecked')">Remaining</button>
    <button onclick="clearAll()">Reset All</button>
  </div>
  <div class="counter" id="counter"></div>

  <div id="list"></div>

  <div class="footer">Two Latinos &middot; Gym Partners</div>
</div>

<script>
const HIS_ITEMS = [
  { cat: "Proteins", name: "Chicken thighs", qty: "5 lbs", note: "8 oz portions — bowls, wraps (~9 meals)" },
  { cat: "Proteins", name: "Ground beef 85/15", qty: "3 lbs", note: "Taco bowls — preferred ground meat (~6 meals)" },
  { cat: "Proteins", name: "Ground turkey 93/7", qty: "2.5 lbs", note: "Taco bowl rotation (~4 meals)" },
  { cat: "Proteins", name: "Eggs", qty: "5 dozen", note: "4 at break-fast + Meal 2C + snacks" },
  { cat: "Proteins", name: "Canned tuna (5 oz)", qty: "10 cans", note: "Meal 2B — 2 cans per meal, ~5 meals" },
  { cat: "Proteins", name: "Greek yogurt (plain)", qty: "2 large tubs", note: "Daily protein snack" },
  { cat: "Proteins", name: "Black beans (canned)", qty: "6 cans", note: "Taco bowls — ~10 meals" },

  { cat: "Produce", name: "Mangos", qty: "7", note: "Whole mango pre-workout, alternating days" },
  { cat: "Produce", name: "Bananas", qty: "3 bunches (~21)", note: "1/day in shake + pre-workout rotation" },
  { cat: "Produce", name: "Pineapple", qty: "1", note: "Anti-inflammatory" },
  { cat: "Produce", name: "Mixed berries (frozen)", qty: "1 bag", note: "Shakes" },
  { cat: "Produce", name: "Broccoli", qty: "4 lbs", note: "1 cup/meal, ~10 meals" },
  { cat: "Produce", name: "Spinach (baby)", qty: "2 large bags", note: "Wraps, salads, bowls" },
  { cat: "Produce", name: "Sweet potatoes", qty: "5 lbs", note: "Meal 2C + salmon plates (~6 meals)" },
  { cat: "Produce", name: "Avocados", qty: "6", note: "Half avocado at break-fast, ~10 meals" },
  { cat: "Produce", name: "Onions", qty: "2 lbs", note: "Cooking base" },
  { cat: "Produce", name: "Garlic", qty: "2 heads", note: "Cooking base — higher volume" },
  { cat: "Produce", name: "Limes", qty: "4-5", note: "Flavor everything" },

  { cat: "Carbs & Pantry", name: "Jasmine rice", qty: "10 lb bag", note: "1.5 cups cooked × ~24 meals" },
  { cat: "Carbs & Pantry", name: "Oats", qty: "1 large canister", note: "Overnight oats" },
  { cat: "Carbs & Pantry", name: "Rice cakes", qty: "2 packs", note: "Pre-workout daily × 14 days" },
  { cat: "Carbs & Pantry", name: "Whole wheat tortillas", qty: "2 packs", note: "Wraps — 2 per meal, ~4 meals" },
  { cat: "Carbs & Pantry", name: "Peanut butter (natural)", qty: "1 large jar", note: "Wraps, rice cakes, snacks" },
  { cat: "Carbs & Pantry", name: "Honey", qty: "1 bottle", note: "Pre-workout drizzle" },
  { cat: "Carbs & Pantry", name: "Olive oil", qty: "1 bottle", note: "Cooking staple" },
  { cat: "Carbs & Pantry", name: "Oat milk", qty: "3 cartons", note: "Overnight oats + shake base" },
  { cat: "Carbs & Pantry", name: "Hot sauce / Salsa", qty: "1 each", note: "Flavor, zero cal" },
  { cat: "Carbs & Pantry", name: "Bread (Powerseed)", qty: "1 loaf", note: "Quick toast option" },
  { cat: "Carbs & Pantry", name: "Zevia", qty: "24-pack", note: "Zero sugar soda swap" },

  { cat: "Supplements", name: "Creatine Monohydrate (micronized)", qty: "1 tub", note: "5-10g daily — lasts 2+ weeks" },
  { cat: "Supplements", name: "Vega Sport Premium Plant Protein", qty: "2 tubs", note: "2 scoops/day × 14 = 28 scoops (~20/tub)" },
  { cat: "Supplements", name: "Collagen peptides", qty: "1 tub", note: "10-15g/day — skin elasticity" },
  { cat: "Supplements", name: "Vitamin C (500mg)", qty: "1 bottle", note: "Collagen synthesis cofactor" },
  { cat: "Supplements", name: "Zinc (15mg)", qty: "1 bottle", note: "Skin repair + collagen cross-linking" },

  { cat: "Cat Food (2 cats, 2 weeks)", name: "Ground turkey (for cats)", qty: "5 lbs", note: "75% of their mix" },
  { cat: "Cat Food (2 cats, 2 weeks)", name: "Chicken thighs (for cats)", qty: "2 lbs", note: "25% of their mix — dice small" },
  { cat: "Cat Food (2 cats, 2 weeks)", name: "Taurine powder", qty: "1 container", note: "Essential — cats can't make their own" },
  { cat: "Cat Food (2 cats, 2 weeks)", name: "Eggshell powder", qty: "1 container", note: "Calcium source" },
  { cat: "Cat Food (2 cats, 2 weeks)", name: "Krill oil", qty: "1 bottle", note: "Omega-3s, coat health" }
];

const HERS_ITEMS = [
  { cat: "Proteins", name: "Chicken thighs", qty: "8 lbs", note: "Higher cal — muscle fuel" },
  { cat: "Proteins", name: "Chicken breast", qty: "4 lbs", note: "Lean option for bowls" },
  { cat: "Proteins", name: "Ground beef 85/15", qty: "6 lbs", note: "Calorie-dense, iron-rich" },
  { cat: "Proteins", name: "Eggs", qty: "5 dozen", note: "Breakfast, snacks, shakes" },
  { cat: "Proteins", name: "Greek yogurt (full-fat)", qty: "2 large tubs", note: "Extra calories + protein" },
  { cat: "Proteins", name: "Canned tuna", qty: "4 cans", note: "Quick protein" },
  { cat: "Proteins", name: "Black beans (canned)", qty: "4 cans", note: "Rice bowls, tacos" },

  { cat: "Produce", name: "Mangos", qty: "3-4", note: "Pre-workout — half mango" },
  { cat: "Produce", name: "Bananas", qty: "2 bunches (~14)", note: "Shakes, snacks, pre-workout" },
  { cat: "Produce", name: "Grapes", qty: "2 bags", note: "Quick carbs" },
  { cat: "Produce", name: "Pineapple", qty: "1", note: "Anti-inflammatory" },
  { cat: "Produce", name: "Mixed berries (frozen)", qty: "2 bags", note: "Shakes, oats, gains shake" },
  { cat: "Produce", name: "Broccoli", qty: "2 lbs", note: "Dinner side" },
  { cat: "Produce", name: "Spinach / kale", qty: "2 large bags", note: "Salads, smoothies, bowls" },
  { cat: "Produce", name: "Sweet potatoes", qty: "10 lbs", note: "Dense energy source" },
  { cat: "Produce", name: "Avocados", qty: "6", note: "Healthy fats — calorie boost" },
  { cat: "Produce", name: "Asparagus or zucchini", qty: "4-5 bundles", note: "Dinner veggie rotation" },
  { cat: "Produce", name: "Onions", qty: "2 lbs", note: "Cooking base" },
  { cat: "Produce", name: "Garlic", qty: "1 head", note: "Cooking base" },
  { cat: "Produce", name: "Limes", qty: "3-4", note: "Flavor everything" },

  { cat: "Carbs & Pantry", name: "Jasmine rice", qty: "5 lb bag", note: "Meal prep base" },
  { cat: "Carbs & Pantry", name: "Quinoa or brown rice", qty: "2 lb bag", note: "Variety option" },
  { cat: "Carbs & Pantry", name: "Oats", qty: "1 large canister", note: "Overnight oats, gains shake" },
  { cat: "Carbs & Pantry", name: "Rice cakes", qty: "1 pack", note: "Pre-workout snack" },
  { cat: "Carbs & Pantry", name: "Whole wheat tortillas", qty: "1 pack", note: "Wraps, quick meals" },
  { cat: "Carbs & Pantry", name: "Nut butter (almond or PB)", qty: "1 large jar", note: "Snack, gains shake, rice cakes" },
  { cat: "Carbs & Pantry", name: "Honey", qty: "1 bottle", note: "Yogurt bowls, oats" },
  { cat: "Carbs & Pantry", name: "Olive oil / avocado oil", qty: "1 bottle", note: "Cooking staple" },
  { cat: "Carbs & Pantry", name: "Almond milk", qty: "2 cartons", note: "Shake base" },
  { cat: "Carbs & Pantry", name: "Hot sauce / Salsa", qty: "1 each", note: "Flavor, zero cal" },

  { cat: "Supplements", name: "Creatine Monohydrate (micronized)", qty: "1 tub", note: "Daily — training + rest days" },
  { cat: "Supplements", name: "Whey Protein Isolate", qty: "1 tub", note: "Post-workout + mid-day scoop" }
];

const STORAGE_HIS = 'gym-grocery-his';
const STORAGE_HERS = 'gym-grocery-hers';

let currentList = 'his';
let currentFilter = 'all';

function getItems() { return currentList === 'his' ? HIS_ITEMS : HERS_ITEMS; }
function getKey() { return currentList === 'his' ? STORAGE_HIS : STORAGE_HERS; }

function getChecked() {
  try { return JSON.parse(localStorage.getItem(getKey())) || []; }
  catch { return []; }
}
function saveChecked(arr) { localStorage.setItem(getKey(), JSON.stringify(arr)); }

function switchList(list) {
  currentList = list;
  currentFilter = 'all';
  document.getElementById('tab-his').className = list === 'his' ? 'tab active-his' : 'tab';
  document.getElementById('tab-hers').className = list === 'hers' ? 'tab active-hers' : 'tab';
  document.querySelectorAll('.toolbar button').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });
  render();
}

function render() {
  const items = getItems();
  const checked = getChecked();
  const list = document.getElementById('list');
  const isHers = currentList === 'hers';
  let html = '';
  let currentCat = '';
  let total = items.length;
  let done = checked.length;

  items.forEach((item, i) => {
    const isChecked = checked.includes(i);
    if (currentFilter === 'unchecked' && isChecked) return;

    if (item.cat !== currentCat) {
      currentCat = item.cat;
      html += `<h2>${currentCat}</h2>`;
    }
    html += `<div class="item ${isHers ? 'item-hers' : ''} ${isChecked ? 'checked' : ''}" onclick="toggle(${i})">
      <div class="checkbox"></div>
      <div class="item-text">${item.name}</div>
      <div class="item-qty">${item.qty}</div>
      <div class="item-note">${item.note}</div>
    </div>`;
  });

  list.innerHTML = html;
  document.getElementById('counter').textContent = `${done} of ${total} items checked`;
}

function toggle(index) {
  let checked = getChecked();
  if (checked.includes(index)) {
    checked = checked.filter(i => i !== index);
  } else {
    checked.push(index);
  }
  saveChecked(checked);
  render();
}

function filterItems(filter) {
  currentFilter = filter;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function clearAll() {
  if (confirm('Reset all checked items?')) {
    saveChecked([]);
    render();
  }
}

render();
</script>
<!-- Supabase Sync -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/supabase-sync.js"></script>
<script src="../js/supabase-auth-ui.js"></script>
<script>
async function onAuthSync() {
  const r1 = await syncChecklist(STORAGE_HIS);
  const r2 = await syncChecklist(STORAGE_HERS);
  if (r1 === 'pulled' || r2 === 'pulled') render();
}

const _origSaveChecked = saveChecked;
saveChecked = function(arr) {
  _origSaveChecked(arr);
  pushChecklist(getKey(), arr).catch(() => {});
};

getSession().then(s => { if (s?.user) onAuthSync(); });
</script>
</body>
</html>
